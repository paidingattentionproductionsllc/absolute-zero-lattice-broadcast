name: Test AZL Lookup
on: [push, pull_request]
jobs:
  test-lattice:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Run AZL CI Suite
        run: python azl_universe.py --test
