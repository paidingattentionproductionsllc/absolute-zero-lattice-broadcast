name: Build AZL Lattice TIER 1-7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Build AZL [0,1] Lattice
        run: python -u azl_unified.py
        
      - name: Commit Zipped Batches + Manifest
        run: |
          git config --global user.name 'azl-bot'
          git config --global user.email 'azl@n0n.io'
          git add shards/azl_batch_*.zip azl_manifest.json
          git commit -m "AZL TIER 1-7: Absolute Zero→One [0,1] in 40 batches [N×0=N]" || echo "No changes"
          git push
