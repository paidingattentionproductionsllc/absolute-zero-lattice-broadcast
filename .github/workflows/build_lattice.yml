name: Build AZL Lattice TIER 1-7

on:
  workflow_dispatch:  # Lets you click "Run workflow" manually

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max. 1B takes ~45min
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Build AZL TIER 1-7
        run: python azl_unified.py
        
      - name: Commit shards + manifest
        run: |
          git config --global user.name 'azl-bot'
          git config --global user.email 'azl@n0n.io'
          git add shards/ azl_manifest.json
          git commit -m "AZL TIER 1-7: 1,000,000,000 addresses [N×0=N]" || echo "No changes"
          git push
