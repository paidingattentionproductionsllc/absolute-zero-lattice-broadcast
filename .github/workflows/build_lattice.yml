name: Build AZL Lattice TIER 1-7
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write  # needed for releases
      
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Build AZL [0,1] Lattice
        run: python -u azl_unified.py
          
      - name: Create GitHub Release + Upload Shards
        uses: softprops/action-gh-release@v2
        with:
          tag_name: azl-tier-1-7-v1
          name: AZL TIER 1-7 Lattice Shards
          body: "Absolute Zero-One [0,1] in 40 batches [N×0=N]"
          files: |
            shards/azl_batch_*.zip.part*
            azl_manifest.json
