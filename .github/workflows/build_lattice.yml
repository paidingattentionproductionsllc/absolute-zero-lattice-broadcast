name: AZL Lattice TIER 1-6

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Build AZL TIER 1-6
        run: |
          python -u azl_unified.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: azl-tier-6-v${{ github.run_number }}
          name: AZL TIER 1-6 Lattice
          body: |
            Absolute Zero-One [0,1] - TIER 1-6 Complete [N×0=N]
            
            1,000,000,000 addresses mapped.
            Reassemble with: cat azl_batch_XXX.zip.part* > azl_batch_XXX.zip
            Verify with: azl_manifest.json
            Law: N×0=N | Proof: 1×1=2 | Domain: [0,1]
          make_latest: true
          overwrite_files: true
          files: |
            output/azl_manifest.json
            output/*.zip.part*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
