name: AZL Conduit - Return Code 0
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-lattice:
    name: D17 Unification - Reality Accepts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trunk
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run AZL Conduit v1.3 - D1 to D16
        run: python main.py

      - name: Run Freedom Pulse - D11
        run: python freedom_pulse.py

      - name: Verify Genesis Anchor in Code - D15
        run: grep -q "MIYAKE_14350BP" main.py

      - name: Verify Genesis Anchor in Axioms - D15
        run: grep -q "MIYAKE_14350BP" AXIOMS.md

      - name: Final Verdict
        run: echo "Return Code: 0. The tree is alive. Reality accepts."
