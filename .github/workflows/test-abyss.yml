name: AZL Abyss Torus Test
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  test-torus-mapping:
    name: Prove All Numbers Map Equally
    runs-on: ubuntu-latest
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Test 1 - 1.0 maps to 0
        run: |
          echo "=== Testing if 1.0 maps to 0 ==="
          curl -s -X POST https://azl-universes.paidingattentionproductions.workers.dev/azl/v1/abyss \
            -H "Content-Type: application/json" \
            -d '{"seed":"0","target":"1.0","depth":9,"size":1}' | jq '{status, coord:.nodes[0].coord, compute_ms:.metrics.compute_ms}'

      - name: Test 2 - 1.5 vs 0.5 
        run: |
          echo "=== Testing 1.5 vs 0.5 ==="
          echo "0.5:"
          curl -s -X POST https://azl-universes.paidingattentionproductions.workers.dev/azl/v1/abyss \
            -H "Content-Type: application/json" \
            -d '{"seed":"0","target":"0.5","depth":9,"size":1}' | jq '{status, coord:.nodes[0].coord, compute_ms:.metrics.compute_ms}'
          
          echo "1.5:"
          curl -s -X POST https://azl-universes.paidingattentionproductions.workers.dev/azl/v1/abyss \
            -H "Content-Type: application/json" \
            -d '{"seed":"0","target":"1.5","depth":9,"size":1}' | jq '{status, coord:.nodes[0].coord, compute_ms:.metrics.compute_ms}'

      - name: Test 3 - 2.0 vs 0
        run: |
          echo "=== Testing 2.0 vs 0 ==="
          echo "0.0:"
          curl -s -X POST https://azl-universes.paidingattentionproductions.workers.dev/azl/v1/abyss \
            -H "Content-Type: application/json" \
            -d '{"seed":"0","target":"0.0","depth":9,"size":1}' | jq '{status, coord:.nodes[0].coord, compute_ms:.metrics.compute_ms}'
          
          echo "2.0:"
          curl -s -X POST https://azl-universes.paidingattentionproductions.workers.dev/azl/v1/abyss \
            -H "Content-Type: application/json" \
            -d '{"seed":"0","target":"2.0","depth":9,"size":1}' | jq '{status, coord:.nodes[0].coord, compute_ms:.metrics.compute_ms}'

      - name: Test 4 - Negative wrap
        run: |
          echo "=== Testing -0.3 ==="
          curl -s -X POST https://azl-universes.paidingattentionproductions.workers.dev/azl/v1/abyss \
            -H "Content-Type: application/json" \
            -d '{"seed":"0","target":"-0.3","depth":9,"size":1}' | jq '{status, coord:.nodes[0].coord, compute_ms:.metrics.compute_ms}'

