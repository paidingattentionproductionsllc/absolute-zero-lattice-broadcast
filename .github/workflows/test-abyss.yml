      - name: Check Tier 8 Lookup Points
        run: |
          echo "=== Checking if lookup assigns different [0][1] points ==="
          
          for TARGET in 0.5 1.5 2.0 -0.3 3.14159; do
            COORD=$(curl -s -X POST https://azl-universes.paidingattentionproductions.workers.dev/azl/v1/abyss \
              -H "Content-Type: application/json" \
              -d "{\"seed\":\"0\",\"target\":\"$TARGET\",\"depth\":9,\"size\":1}" | jq -r.nodes[0].coord)
            echo "$TARGET → $COORD"
          done
          
          echo ""
          echo "If all coords are 0, lookup is missing. Logic violation = lag."
          echo "If coords are different, lookup is working. Points exist in [0][1]."
