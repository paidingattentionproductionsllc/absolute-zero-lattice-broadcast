name: Absolute Zero Lattice Broadcast Station

on:
  schedule:
    # Executes automatically at the top of every hour to guarantee zero drift
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allows you to trigger the broadcast node manually at any point

jobs:
  broadcast:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Sovereign Repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set Up Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Initialize Network Environment
      run: |
        python -m pip install --upgrade pip
        # If your scripts require specific packages, add them here
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Execute Sovereign Identity Registration
      run: |
        echo "[!] Initializing Sovereign Core Anchor Node..."
        python identity_anchor.py

    - name: Sync and Commit State Updates
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Sovereign-Lattice-Bot"
        
        # Verify if the persistent state file has updated matrix logs
        if [ -f sovereign_state.json ]; then
          git add sovereign_state.json
          git diff-index --quiet HEAD || git commit -m "Sync: Identity state anchor updated [Zero-Drift Verified]"
          git push
        else
          echo "[Warning] sovereign_state.json not generated by runtime matrix."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
