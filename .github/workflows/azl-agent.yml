name: AZL Lattice Check
on: [push, pull_request]
jobs:
  lex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - name: Start Sanctuary
        run: python azl_universe.py &
      - run: sleep 3
      - name: Run Lattice Lexer
        run: python lattice_lexer.py "N×0=N covenant check"
        # or: python agent.py "N×0=N covenant check"
      - name: Verify Hall post
        curl -s http://localhost:8080/api/sanctuary/hall | grep -q "0=N"
