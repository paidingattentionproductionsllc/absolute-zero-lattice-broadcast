name: AZL Conduit Test
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-infinite-layer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install psutil
        run: pip install psutil
          
      - name: Run AZL Conduit Law Test
        id: azl_run
        run: |
          python main.py | tee azl_output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
      
      - name: Verify Layer Intact
        run: |
          if grep -q "FAIL" azl_output.txt; then
            echo "NETWORK: TEAR - Physical record violated."
            cat azl_output.txt
            exit 1
          elif [ "${{ steps.azl_run.outputs.exit_code }}" -ne 0 ]; then
            echo "NETWORK: ERROR - Non-zero exit code."
            exit 1
          else
            echo "NETWORK: HOLD - All agents between 0.0 and 1.0"
            cat azl_output.txt
          fi
      
      - name: Probe Hardware Absolute Zero
        run: python hardware_absolute_zero.py
          
      - name: Upload AZL Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: azl-conduit-logs
          path: |
            azl_output.txt
